apiVersion: networking.k8s.io/v1
# Gateway doesn't use labels but Service **Name**
kind: Ingress
metadata:
  name: learning-ingress
  namespace: learning-nginx
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: svc-api
                port:
                  # Match service port defined in 5.api-service.yaml
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: svc-ui
                port:
                  # Match service port defined in 3.ui-service.yaml
                  number: 80
